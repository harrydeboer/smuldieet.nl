version: '3.8'

services:
  web:
    build:
      dockerfile: docker/web/Dockerfile
      context: .
    image: harrydeboer/smuldieet.nl:latest
    working_dir: /var/www/html
    container_name: smuldieet
    ports:
      - "80:80"
      - "443:443"
    networks:
      smuldieet:
    depends_on:
      - database
  database:
    image: mysql:8.0.31
    container_name: smuldieet-database
    env_file: .env.local
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      smuldieet:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.1
    container_name: smuldieet-elasticsearch
    env_file: .env.local
    environment:
      - node.name=smuldieet-elasticsearch
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      smuldieet:

volumes:
  mysqldata:
    driver: local

networks:
  smuldieet:
    ipam:
      driver: default
